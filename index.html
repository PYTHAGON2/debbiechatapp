<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debbie Chatbox</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Debbie Chatbox 🎀</h1>
    </div>
    <div class="controls">
        <button id="btn-load">Load Last <span id="load-count">4</span></button>
        <button id="btn-clear">Clear Screen</button>
        <button id="btn-night">Toggle Night</button>
    </div>
    
    <div id="chat-container">
        <!-- Messages will appear here -->
    </div>
    
    <div class="input-area">
        <div class="emoji-bar">
            <!-- some basic emoji and markup buttons -->
            <button class="em-btn" onclick="addText('😊')">😊</button>
            <button class="em-btn" onclick="addText('😂')">😂</button>
            <button class="em-btn" onclick="addText('❤️')">❤️</button>
            <button class="em-btn" onclick="addText('✨')">✨</button>
            <button class="em-btn" onclick="addText('*')"><b>B</b></button>
            <button class="em-btn" onclick="addText('_')"><i>I</i></button>
        </div>
        <form id="chat-form" onsubmit="return sendMessage(event)">
            <input type="text" id="msg-input" autocomplete="off" placeholder="Say something cute...">
            <button type="submit" id="btn-send">Send</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
